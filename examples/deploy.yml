# Variant 2 — Tabbify builds your repo on its own infra (FC sandbox).
# Copy to your app repo at .github/workflows/deploy.yml.
name: Deploy to Tabbify
on:
  push:
    branches: [main]
jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read              # github.token = repo-scoped clone token
    steps:
      - uses: actions/checkout@v4
      - uses: tabbify-io/deploy@v1
        with:
          token: ${{ secrets.TABBIFY_TOKEN }}
          # remote: true (default) — clone+build happens on Tabbify infra
          # clone-token defaults to github.token — no GitHub App needed
